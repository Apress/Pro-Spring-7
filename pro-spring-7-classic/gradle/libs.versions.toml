jakartaInject = { module = "jakarta.inject:jakarta.inject-api", version.ref = "jakartaInjectApi" }
logback = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
junitJupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "jUnit" }
junitJupiterPlatform = { module = "org.junit.platform:junit-platform-launcher", version.ref = "jUnit" }
springContext = { module = "org.springframework:spring-context", version.ref = "spring" }
