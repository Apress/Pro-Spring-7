springDataEnvers = { module = "org.springframework.data:spring-data-envers", version.ref = "springData" }
springDataR2dbc = { module = "org.springframework.data:spring-data-r2dbc", version.ref = "springData" }
springDataMongo = { module = "org.springframework.data:spring-data-mongodb", version.ref = "springDataNoSql" }
springSecurityWeb = { module = "org.springframework.security:spring-security-web", version.ref = "springSecurity" }
springSecurityConfig = { module = "org.springframework.security:spring-security-config", version.ref = "springSecurity" }
mariaDB = { module = "org.mariadb.jdbc:mariadb-java-client", version.ref = "mariaDB" }
