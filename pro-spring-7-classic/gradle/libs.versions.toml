servletVersion       = "6.2.0-M1"
thymeleafVersion     = "3.1.3.RELEASE"
hamcrestVersion      = "3.0"
commonsIO            = "2.21.0"

[plugins]
jooqPlugin = { id = "org.jooq.jooq-codegen-gradle", version.ref = "jooq"}

[libraries]
aspectjweaver = { module = "org.aspectj:aspectjweaver", version.ref = "aspectj"}
aspectjrt = { module = "org.aspectj:aspectjrt", version.ref = "aspectj"}
mockito = { module = "org.mockito:mockito-core", version.ref = "mockito"}
