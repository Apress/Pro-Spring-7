reactorCore = {module = "io.projectreactor:reactor-core", version.ref = "reactor"}
commonsLang3 = {module = "org.apache.commons:commons-lang3", version.ref = "lang3Version"}
servletApi = {module = "jakarta.servlet:jakarta.servlet-api", version.ref = "servletVersion"}
thymeleaf = {module = "org.thymeleaf:thymeleaf-spring6", version.ref = "thymeleafVersion"}
thymeleafTime = {module = "org.thymeleaf.extras:thymeleaf-extras-java8time", version = "3.0.4.RELEASE"}
tomcatEl = {module = "org.apache.tomcat.embed:tomcat-embed-el", version = "11.0.15"}
hamcrest = {module = "org.hamcrest:hamcrest", version.ref = "hamcrestVersion"}
commonsIO = {module = "commons-io:commons-io", version.ref = "commonsIO"}
