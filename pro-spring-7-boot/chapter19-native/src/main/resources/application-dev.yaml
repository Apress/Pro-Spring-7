server:
  port: 8081
  servlet:
    context-path: /
  compression:
    enabled: true # improves website performance by compressing response body
  address: 0.0.0.0

# Logging config
logging:
  pattern:
    console: "%-5level: %class{0} - %msg%n"
  level:
    root: INFO
    org.springframework.boot: DEBUG
    com.apress.prospring7.boot.nineteen: INFO
