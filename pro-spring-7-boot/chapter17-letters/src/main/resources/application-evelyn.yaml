spring:
  application:
    name: chapter17-evelyn-app
  h2:
    console:
      enabled: true

  data:
    rest:
      base-path: "/"
  datasource:
    url: "jdbc:h2:mem:testdb"
    driverClassName: "org.h2.Driver"
    username: sa
    password: password
  jpa:
    database-platform: "org.hibernate.dialect.H2Dialect"
    hibernate:
      ddl-auto: create-drop
# Uppercase Table Names
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

app:
  sender:
    name: "Evelyn"
  correspondent:
    address: "http://localhost:8090" # Tom's address

server:
  port: 8080
  compression:
    enabled: true
  address: 0.0.0.0

# Logging config
logging:
  pattern:
    console: "%-5level: %class{0} - %msg%n"
  level:
    root: INFO
    org.springframework: DEBUG
    com.apress.prospring7.boot.seventeen: INFO
