spring:
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  messages:
    basename: i18n/global
    encoding: UTF-8
    always-use-message-format: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB
  thymeleaf:
    prefix: classpath:templates/
    suffix: .html
    mode: HTML
    cache: false
    check-template: false
    reactive:
      max-chunk-size: 8192
    encoding: UTF-8
  datasource:
    url: "jdbc:tc:mariadb:latest:///testdb?TC_INITSCRIPT=testcontainers/create-schema.sql"
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 10
          fetch_size: 30
        max_fetch_depth: 3
        show-sql: true
        format-sql: true
        use_sql_comments: true
        hbm2ddl:
          auto: none

#  autoconfigure:
#    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Logging config
logging:
  pattern:
    console: "%-5level: %class{0} - %msg%n"
  level:
    root: INFO
    org.springframework: TRACE
    org.springframework.boot: DEBUG
    com.apress.prospring7.boot.sixteen: INFO
