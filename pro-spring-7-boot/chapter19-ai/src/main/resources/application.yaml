spring:
  ai:
    ollama:
      chat:
        options:
          model: llava
      base-url: http://localhost:11434 # default value
      init:
        pull-model-strategy: when_missing # useful for models used dynamically at runtime
        timeout: 60s
        max-retries: 1

server:
  port: 8081
  servlet:
    context-path: /
  compression:
    enabled: true
  address: 0.0.0.0

# Logging config
logging:
  pattern:
    console: "%-5level: %class{0} - %msg%n"
  level:
    root: INFO
    org.springframework.ai: DEBUG
    com.apress.prospring7.boot.nineteen: INFO
