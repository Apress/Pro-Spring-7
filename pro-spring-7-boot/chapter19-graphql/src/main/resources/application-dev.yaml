server:
  port: 8081
  servlet:
    context-path: /
  compression:
    enabled: true
  address: 0.0.0.0

spring:
  graphql:
    graphiql:
      enabled: true
      path: graphiql
  datasource:
    driverClassName: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/musicdb?useSSL=false
    username: prospring7
    password: prospring7
    hikari:
      maximum-pool-size: 25
  jpa:
    generate-ddl: false
    properties:
      hibernate:
        naming:
          physical-strategy: com.apress.prospring7.boot.nineteen.CustomPhysicalNamingStrategy
        jdbc:
          batch_size: 10
          fetch_size: 30
        max_fetch_depth: 3
        hbm2ddl:
          auto: none
    open-in-view: false # this causes the LazyInitializationException

# Logging config
logging:
  pattern:
    console: "%-5level: %class{0} - %msg%n"
  level:
    root: INFO
    org.springframework.boot: DEBUG
    com.apress.prospring7.boot.nineteen: INFO
    sql: debug
